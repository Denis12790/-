<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой YouTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Добро пожаловать на Мой YouTube</h1>

    <!-- Кнопки для регистрации и аккаунта -->
    <div id="actions">
        <button id="registerBtn">Зарегистрироваться</button> <!-- Кнопка регистрации -->
    </div>

    <!-- Форма регистрации -->
    <div id="registrationForm" style="display: none;">
        <h2>Регистрация</h2>
        <form id="registerForm">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" required><br><br>
            
            <label for="email">Email:</label>
            <input type="email" id="email" required><br><br>

            <label for="password">Пароль:</label>
            <input type="password" id="password" required><br><br>

            <label for="confirmPassword">Подтвердите пароль:</label>
            <input type="password" id="confirmPassword" required><br><br>

            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>

    <!-- Сообщение об успешной регистрации и отображение данных пользователя -->
    <div id="successMessage" style="display: none;">
        <h2>Вы успешно зарегистрированы!</h2>
        <p id="userDetails"></p> <!-- Отображение имени пользователя и email -->
        <button id="logoutBtn">Выйти из аккаунта</button> <!-- Кнопка выхода -->
    </div>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход на сайт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #loginForm {
            display: none;
            margin-top: 20px;
        }
        #loginMessage {
            display: none;
            margin-top: 20px;
            color: green;
        }
        #errorMessage {
            display: none;
            margin-top: 10px;
            color: red;
        }
        #logoutButton {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Добро пожаловать на наш сайт!</h1>

    <!-- Кнопка входа -->
    <button id="loginButton">Вход</button>

    <!-- Форма входа -->
    <div id="loginForm">
        <h2>Форма входа</h2>
        <form id="loginFormElement">
            <label for="email">Имейл:</label>
            <input type="email" id="email" required><br><br>
            <label for="password">Пароль:</label>
            <input type="password" id="password" required><br><br>
            <button type="submit">Войти</button>
        </form>
        <p id="errorMessage">Неправильный пароль</p>
    </div>

    <!-- Сообщение после успешного входа -->
    <p id="loginMessage"></p>

    <!-- Кнопка выхода -->
    <button id="logoutButton">Выйти</button>

    <script>
        const loginButton = document.getElementById("loginButton");
        const loginForm = document.getElementById("loginForm");
        const loginFormElement = document.getElementById("loginFormElement");
        const loginMessage = document.getElementById("loginMessage");
        const logoutButton = document.getElementById("logoutButton");
        const errorMessage = document.getElementById("errorMessage");

        // Условный правильный пароль
        const correctPassword = "123456";

        // Открытие формы входа
        loginButton.onclick = function() {
            loginForm.style.display = "block";
            loginButton.style.display = "none";
        };

        // Проверка входа
        loginFormElement.onsubmit = function(event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (password === correctPassword) {
                // Успешный вход
                loginMessage.style.display = "block";
                loginMessage.innerHTML = `Вы успешно вошли!<br>Имя пользователя: ${email}<br>e-mail: ${email}`;

                logoutButton.style.display = "inline-block";
                loginForm.style.display = "none";
                errorMessage.style.display = "none"; // Скрываем ошибку
            } else {
                // Ошибка неправильного пароля
                errorMessage.style.display = "block";
            }
        };

        // Выход из аккаунта
        logoutButton.onclick = function() {
            loginMessage.style.display = "none";
            logoutButton.style.display = "none";
            loginButton.style.display = "inline-block";
        };
    </script>

</body>
</html>
<input type="text" id="nameInput" placeholder="Введите имя">
<button onclick="saveName()">Сохранить</button>
<p id="welcomeMessage"></p>

<script>
    function saveName() {
        let name = document.getElementById("nameInput").value;
        localStorage.setItem("username", name); // Сохраняем имя
        document.getElementById("welcomeMessage").textContent = "Привет, " + name + "!";
    }

    // Проверяем, есть ли имя в localStorage при загрузке страницы
    window.onload = function() {
        let savedName = localStorage.getItem("username");
        if (savedName) {
            document.getElementById("welcomeMessage").textContent = "Привет, " + savedName + "!";
        }
    };
</script>
