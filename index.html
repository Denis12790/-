<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать канал</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Добро пожаловать на мой сайт</h1>

    <!-- Кнопка для создания канала -->
    <button id="createChannelBtn">Создать канал</button>

    <!-- Форма для ввода названия канала -->
    <div id="createChannelForm" style="display: none;">
        <h2>Введите название канала</h2>
        <input type="text" id="channelName" placeholder="Название канала" required>
        <button id="submitChannel">Создать канал</button>
    </div>

    <!-- Сообщение о создании канала и форма для загрузки видео -->
    <div id="channelCreated" style="display: none;">
        <h2>Твой канал создан!</h2>
        <p>Название канала: <span id="channelNameDisplay"></span></p>

        <!-- Форма для загрузки видео -->
        <input type="file" id="videoFile" accept="video/*" />
        <button id="uploadVideoBtn">Загрузить видео</button>

        <!-- Место для отображения канала и видео -->
        <div id="channelDisplay" style="display: none;">
            <h3>Канал: <span id="channelNameDisplayHere"></span></h3>
            <video id="videoPlayer" width="640" controls>
                <source id="videoSource" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
