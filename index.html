<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой YouTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Добро пожаловать на Мой YouTube</h1>

    <!-- Кнопки для регистрации и создания канала -->
    <div id="actions">
        <button id="registerBtn">Зарегистрироваться</button>
        <button id="createChannelBtn">Создать канал</button>
    </div>

    <!-- Форма регистрации (по умолчанию скрыта) -->
    <div id="registrationForm" style="display: none;">
        <h2>Регистрация</h2>
        <form>
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" required><br><br>
            
            <label for="email">Email:</label>
            <input type="email" id="email" required><br><br>

            <label for="password">Пароль:</label>
            <input type="password" id="password" required><br><br>

            <label for="confirmPassword">Подтвердите пароль:</label>
            <input type="password" id="confirmPassword" required><br><br>

            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>

    <!-- Форма создания канала (по умолчанию скрыта) -->
    <div id="createChannelForm" style="display: none;">
        <h2>Создание канала</h2>
        <form>
            <label for="channelName">Название канала:</label>
            <input type="text" id="channelName" required><br><br>
            <button type="submit">Создать канал</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
