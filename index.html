<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой YouTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Добро пожаловать на Мой YouTube</h1>

    <!-- Кнопки для регистрации и аккаунта -->
    <div id="actions">
        <button id="registerBtn">Зарегистрироваться</button> <!-- Кнопка регистрации -->
    </div>

    <!-- Форма регистрации -->
    <div id="registrationForm" style="display: none;">
        <h2>Регистрация</h2>
        <form id="registerForm">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" required><br><br>
            
            <label for="email">Email:</label>
            <input type="email" id="email" required><br><br>

            <label for="password">Пароль:</label>
            <input type="password" id="password" required><br><br>

            <label for="confirmPassword">Подтвердите пароль:</label>
            <input type="password" id="confirmPassword" required><br><br>

            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>

    <!-- Сообщение об успешной регистрации и отображение данных пользователя -->
    <div id="successMessage" style="display: none;">
        <h2>Вы успешно зарегистрированы!</h2>
        <p id="userDetails"></p> <!-- Отображение имени пользователя и email -->
        <button id="logoutBtn">Выйти из аккаунта</button> <!-- Кнопка выхода -->
    </div>

    <script src="script.js"></script>
</body>
</html>
